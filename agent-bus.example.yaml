version: 1
workspace:
  artifactsDir: workspace
  stateDir: .agent-bus/state
  logsDir: .agent-bus/logs

agents:
  - id: ba_codex
    runtime: codex
    description: Business analyst and planning agent running in Codex.
    command:
      - codex
      - run
      - --mode
      - plan
  - id: tech_lead_claude
    runtime: claude-code
    description: System design agent running in Claude Code.
    command:
      - claude
      - run
      - --mode
      - design
  - id: qa_antigravity
    runtime: antigravity
    description: QA agent producing acceptance tests and test cases.
    command:
      - antigravity
      - run
      - --mode
      - qa
  - id: coder_open_code
    runtime: open-code
    description: Implementation agent running in Open Code with a local model.
    command:
      - open-code
      - run
      - --mode
      - implement

subscriptions:
  - agentId: tech_lead_claude
    topic: plan_done
    description: Start system design after approved planning.
    requiredArtifacts:
      - path: docs/plan.md
        role: input
        description: Approved delivery plan.
  - agentId: qa_antigravity
    topic: plan_done
    description: Produce test cases from the approved plan.
    requiredArtifacts:
      - path: docs/plan.md
        role: input
        description: Approved delivery plan.
  - agentId: coder_open_code
    topic: system_design_done
    description: Start implementation after approved system design.
    requiredArtifacts:
      - path: docs/plan.md
        role: input
        description: Approved delivery plan.
      - path: docs/system-design.md
        role: input
        description: Approved system design.
      - path: docs/test-cases.md
        role: input
        description: QA test cases produced from the plan.

approvalGates:
  - topic: plan_done
    decision: manual
    approvers:
      - human
    onReject: return_to_producer
  - topic: system_design_done
    decision: manual
    approvers:
      - human
    onReject: return_to_producer

artifactConventions:
  - topic: plan_done
    outputs:
      - path: docs/plan.md
        role: primary
        description: Approved implementation plan.
  - topic: system_design_done
    outputs:
      - path: docs/system-design.md
        role: primary
        description: Approved system design.
      - path: docs/test-cases.md
        role: companion
        description: QA test cases generated from the plan.
